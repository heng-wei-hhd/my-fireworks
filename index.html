<script type="module">
import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

/* ---------------- 判断是否为手机 (屏幕宽度小于 768px) ---------------- */
const isMobile = window.innerWidth < 768;

/* ---------------- Map Setup ---------------- */
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/positron',
  // 爱丁堡中心
  center: [-3.200, 55.948], 
  // 【修复1】如果是手机，就缩小一点 (13.5)，视野更开阔；电脑则保持 15
  zoom: isMobile ? 13.5 : 15,
  // 【修复2】手机上把仰角调低一点 (50度)，防止建筑物挡住太多视线
  pitch: isMobile ? 50 : 60,
  bearing: 15,
  antialias: true,
  interactive: true
});

/* ---------------- Camera Animation Logic ---------------- */
// 增加一个开关：如果用户在操作，就暂停旋转
let userInteracting = false;

// 监听用户操作：一旦触摸或鼠标按下，就停止自动旋转
map.on('mousedown', () => { userInteracting = true; });
map.on('touchstart', () => { userInteracting = true; });
map.on('dragstart', () => { userInteracting = true; });

// (可选) 如果你希望用户松手后过一会儿恢复旋转，可以取消下面这行的注释
// map.on('moveend', () => { setTimeout(() => userInteracting = false, 2000); });

function rotateCamera(timestamp) {
  // 【修复3】只有当用户没有在操作时，才自动旋转
  if (!userInteracting) {
    const rotationSpeed = 0.03; 
    map.setBearing(map.getBearing() + rotationSpeed);

    const tiltSpeed = timestamp / 3000; 
    const newPitch = (isMobile ? 50 : 60) + Math.sin(tiltSpeed) * 10;
    map.setPitch(newPitch);
  }

  requestAnimationFrame(rotateCamera);
}

/* ---------------- Firework Factory ---------------- */
function createFirework(lng, lat) {
  // 手机上稍微降低一点爆炸高度，保证在屏幕内
  const targetAltitude = (isMobile ? 150 : 120) + Math.random() * 100;
  const mercGround = maplibregl.MercatorCoordinate.fromLngLat({ lng, lat }, 0);
  const scale = mercGround.meterInMercatorCoordinateUnits();

  // 手机为了性能，减少一点粒子数量 (150 vs 200)
  const count = isMobile ? 150 : 200; 
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3).fill(0);
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: new THREE.Color().setHSL(Math.random(), 1, 0.6),
    // 手机屏幕像素密度高，粒子稍微调大一点点
    size: isMobile ? 6 : 5, 
    transparent: true,
    opacity: 1,
    depthWrite: false
  });

  const points = new THREE.Points(geometry, material);
  
  const launchVX = (Math.random() - 0.5) * 2.0; 
  const launchVZ = (Math.random() - 0.5) * 2.0;

  points.userData = {
    state: 'launching',
    currentAlt: 0,
    targetAlt: targetAltitude,
    lng, lat,
    scale,
    launchVX,
    launchVZ,
    velocities: Array.from({length: count}, () => ({
      x: (Math.random() - 0.5) * 20,
      y: (Math.random() - 0.2) * 25,
      z: (Math.random() - 0.5) * 20
    })),
    life: new Array(count).fill(1.0)
  };

  return points;
}

map.on('load', async () => {
  requestAnimationFrame(rotateCamera);

  const layers = map.getStyle().layers;
  let labelLayerId;
  for (let i = 0; i < layers.length; i++) {
    if (layers[i].type === 'symbol' && layers[i].layout['text-field']) {
      labelLayerId = layers[i].id;
      break;
    }
  }

  map.addLayer({
    'id': 'buildings-3d',
    'source': 'openmaptiles', 
    'source-layer': 'building',
    'type': 'fill-extrusion',
    'paint': {
      'fill-extrusion-color': '#222', 
      'fill-extrusion-height': [
        'interpolate', ['linear'], ['zoom'],
        15, 0,
        15.05, ['coalesce', ['get', 'render_height'], 15] 
      ],
      'fill-extrusion-base': [
        'interpolate', ['linear'], ['zoom'],
        15, 0,
        15.05, ['coalesce', ['get', 'render_min_height'], 0]
      ],
      'fill-extrusion-opacity': 0.8
    }
  }, labelLayerId);

  const fireworksLayer = {
    id: 'fireworks',
    type: 'custom',
    renderingMode: '3d',
    onAdd(map, gl) {
      this.camera = new THREE.Camera();
      this.scene = new THREE.Scene();
      this.renderer = new THREE.WebGLRenderer({ 
        canvas: map.getCanvas(), 
        context: gl, 
        antialias: true, 
        alpha: true 
      });
      this.renderer.autoClear = false;
      this.fireworks = [];

      setInterval(() => {
        const center = map.getCenter();
        // 手机屏幕小，稍微增加一点烟花散布范围
        const spread = isMobile ? 0.008 : 0.006; 
        const lng = center.lng + (Math.random() - 0.5) * spread;
        const lat = center.lat + (Math.random() - 0.5) * spread;
        
        const fw = createFirework(lng, lat);
        this.scene.add(fw);
        this.fireworks.push(fw);
      }, 500);
    },

    render(gl, matrix) {
      this.camera.projectionMatrix.fromArray(matrix);
      
      for (let i = this.fireworks.length - 1; i >= 0; i--) {
        const fw = this.fireworks[i];
        const ud = fw.userData;

        if (ud.state === 'launching') {
          ud.lng += ud.launchVX * 0.00003;
          ud.lat += ud.launchVZ * 0.00003;
          ud.currentAlt += 6.0; 
          const merc = maplibregl.MercatorCoordinate.fromLngLat({ lng: ud.lng, lat: ud.lat }, ud.currentAlt);
          fw.position.set(merc.x, merc.y, merc.z);
          if (ud.currentAlt >= ud.targetAlt) ud.state = 'exploding';
        } else {
          const pos = fw.geometry.attributes.position.array;
          let anyAlive = false;
          for (let j = 0; j < ud.velocities.length; j++) {
            if (ud.life[j] <= 0) continue;
            pos[j*3]     += ud.velocities[j].x * ud.scale * 0.04;
            pos[j*3 + 1] += ud.velocities[j].y * ud.scale * 0.04;
            pos[j*3 + 2] += ud.velocities[j].z * ud.scale * 0.04;
            ud.velocities[j].y -= 9.8 * ud.scale * 0.02; 
            ud.life[j] -= 0.015; 
            anyAlive = true;
          }
          fw.material.opacity -= 0.01; 
          fw.geometry.attributes.position.needsUpdate = true;
          if (!anyAlive || fw.material.opacity <= 0) {
            this.scene.remove(fw);
            fw.geometry.dispose();
            fw.material.dispose();
            this.fireworks.splice(i, 1);
          }
        }
      }
      this.renderer.resetState();
      this.renderer.render(this.scene, this.camera);
      map.triggerRepaint();
    }
  };

  map.addLayer(fireworksLayer);
});
</script>
